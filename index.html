<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#0f172a" />
    <title>سامانه ثبتی مدیریت و تسهیم زنجیره‌ای املاک</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;700;900&display=swap');
        
        body { 
            font-family: 'Vazirmatn', sans-serif; 
            overscroll-behavior: none; /* جلوگیری از رفرش ناخواسته در موبایل */
            -webkit-tap-highlight-color: transparent; /* حذف هاله سیاه هنگام لمس در موبایل */
        }
        
        .toast-enter { animation: slideUp 0.3s ease-out forwards; }
        @keyframes slideUp { from { transform: translate(-50%, 20px); opacity: 0; } to { transform: translate(-50%, 0); opacity: 1; } }
        
        /* استایل‌های اختصاصی برای چاپ و پرینت */
        @media print { 
            .no-print { display: none !important; } 
            body { background: white !important; color: black !important; }
            .print-card { border: 1px solid #000 !important; box-shadow: none !important; padding: 20px !important; }
        }
        
        /* زیباسازی اسکرول‌بار برای لیست‌های طولانی */
        .custom-scroll::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #94a3b8; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen antialiased selection:bg-blue-600 selection:text-white">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // ─── توابع ریاضی محاسبات کسرها ───
        const gcd = (a, b) => {
            a = Math.abs(Math.round(a));
            b = Math.abs(Math.round(b));
            while (b) { [a, b] = [b, a % b]; }
            return a || 1;
        };

        const simplifyFraction = (num, den) => {
            const g = gcd(num, den);
            return { num: num / g, den: den / g };
        };

        const formatFraction = (num, den) => {
            const s = simplifyFraction(num, den);
            return `${s.num} از ${s.den}`;
        };

        // ─── کامپوننت اعلان‌ها (Toast) ───
        function Toast({ message, type, onClose }) {
            useEffect(() => {
                const t = setTimeout(onClose, 3500);
                return () => clearTimeout(t);
            }, [onClose]);

            const colors = {
                success: 'bg-slate-900 border-r-4 border-emerald-500 text-white',
                error: 'bg-slate-900 border-r-4 border-rose-500 text-white',
                info: 'bg-slate-900 border-r-4 border-blue-500 text-white',
            };

            return (
                <div className={`fixed bottom-6 left-1/2 -translate-x-1/2 z-50 ${colors[type]} px-5 py-3 rounded-xl shadow-2xl toast-enter flex items-center gap-3 text-xs sm:text-sm font-medium w-11/12 max-w-sm border border-slate-800`}>
                    <span>{type === 'success' ? '🔹' : type === 'error' ? '❌' : 'ℹ️'}</span>
                    <span>{message}</span>
                </div>
            );
        }

        // ─── مودال تایید حذف ───
        function ConfirmDialog({ message, onConfirm, onCancel }) {
            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4" onClick={onCancel}>
                    <div className="bg-white rounded-2xl shadow-xl border border-slate-200 p-5 sm:p-6 max-w-sm w-full" onClick={e => e.stopPropagation()}>
                        <h3 className="text-base sm:text-lg font-bold text-slate-900 mb-2 flex items-center gap-2">⚠️ هشدار سیستم</h3>
                        <p className="text-slate-600 text-xs sm:text-sm leading-relaxed mb-6">{message}</p>
                        <div className="flex gap-2 sm:gap-3">
                            <button onClick={onConfirm} className="flex-1 bg-rose-600 hover:bg-rose-700 text-white py-2.5 rounded-xl text-xs font-bold transition-all">
                                تایید و حذف
                            </button>
                            <button onClick={onCancel} className="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 py-2.5 rounded-xl text-xs font-bold transition-all">
                                انصراف
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // ─── کامپوننت اصلی سیستم ───
        function App() {
            const [activeTab, setActiveTab] = useState('form1');
            const [area, setArea] = useState(0);
            const [propertyId, setPropertyId] = useState('');
            const [owners, setOwners] = useState([]);
            const [transfers, setTransfers] = useState([]);
            const [finalOwners, setFinalOwners] = useState([]);
            const [toast, setToast] = useState(null);
            const [confirmDialog, setConfirmDialog] = useState(null);

            // فرم ۱: مالکین اولیه
            const [f1Name, setF1Name] = useState('');
            const [f1Num, setF1Num] = useState('');
            const [f1Den, setF1Den] = useState('');
            const [f1Date, setF1Date] = useState('');
            const [f1Notes, setF1Notes] = useState('');

            // فرم ۲: انتقالات
            const [f2Seller, setF2Seller] = useState('');
            const [f2Buyer, setF2Buyer] = useState('');
            const [f2IsNewBuyer, setF2IsNewBuyer] = useState(false);
            const [f2NewBuyerName, setF2NewBuyerName] = useState('');
            const [f2Num, setF2Num] = useState('');
            const [f2Den, setF2Den] = useState('');
            const [f2Date, setF2Date] = useState('');
            const [f2Notes, setF2Notes] = useState('');

            // استخراج لیست کامل نام‌ها جهت استفاده در لیست‌های کشویی
            const allNames = Array.from(new Set([
                ...owners.map(o => o.name),
                ...transfers.map(t => t.sellerName),
                ...transfers.map(t => t.buyerName),
            ])).filter(Boolean).sort();

            // بارگذاری اطلاعات از حافظه مرورگر در اولین اجرا
            useEffect(() => {
                try {
                    const saved = localStorage.getItem('registry_property_data');
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        if (parsed.area) setArea(parsed.area);
                        if (parsed.propertyId) setPropertyId(parsed.propertyId);
                        if (parsed.owners) setOwners(parsed.owners);
                        if (parsed.transfers) setTransfers(parsed.transfers);
                    }
                } catch (e) { console.error("Error loading data", e); }
            }, []);

            // ذخیره‌سازی خودکار تغییرات
            useEffect(() => {
                if (owners.length > 0 || transfers.length > 0 || area > 0 || propertyId) {
                    localStorage.setItem('registry_property_data', JSON.stringify({ area, propertyId, owners, transfers }));
                }
            }, [area, propertyId, owners, transfers]);

            // تابع محاسبه زنده سهم فعلی هر شخص
            const getCurrentFraction = useCallback((name) => {
                let frac = 0;
                owners.forEach(o => { if (o.name === name) frac += o.shareNumerator / o.shareDenominator; });
                transfers.forEach(t => {
                    const tf = t.transferredNumerator / t.transferredDenominator;
                    if (t.sellerName === name) frac -= tf;
                    if (t.buyerName === name) frac += tf;
                });
                return Math.max(0, frac);
            }, [owners, transfers]);

            // محاسبات نهایی املاک
            const calculateFinalShares = useCallback(() => {
                const ownership = new Map();

                owners.forEach(o => {
                    const frac = o.shareNumerator / o.shareDenominator;
                    ownership.set(o.name, (ownership.get(o.name) || 0) + frac);
                });

                transfers.forEach(t => {
                    const frac = t.transferredNumerator / t.transferredDenominator;
                    ownership.set(t.sellerName, (ownership.get(t.sellerName) || 0) - frac);
                    ownership.set(t.buyerName, (ownership.get(t.buyerName) || 0) + frac);
                });

                const results = [];
                const totalArea = area || 0;

                ownership.forEach((frac, name) => {
                    if (frac > 0.000001) { // حذف سهم‌های صفر شده
                        const baseDen = 100000; 
                        const num = Math.round(frac * baseDen);
                        const simplified = simplifyFraction(num, baseDen);
                        const percentage = Math.round(frac * 10000) / 100;

                        results.push({
                            name,
                            shareNumerator: simplified.num,
                            shareDenominator: simplified.den,
                            exactArea: Math.round(frac * totalArea * 100) / 100,
                            percentage: percentage
                        });
                    }
                });

                results.sort((a, b) => b.percentage - a.percentage);
                setFinalOwners(results);
            }, [owners, transfers, area]);

            useEffect(() => { calculateFinalShares(); }, [calculateFinalShares]);

            // ثبت مالک اولیه
            const addOwner = () => {
                const name = f1Name.trim();
                const num = parseInt(f1Num) || 0;
                const den = parseInt(f1Den) || 0;

                if (!name) { showToast('نام مالک اولیه باید وارد شود.', 'error'); return; }
                if (num <= 0 || den <= 0) { showToast('سهم باید بزرگتر از صفر باشد.', 'error'); return; }
                if (num > den) { showToast('سهم جزء نمی‌تواند از کل سهم بزرگتر باشد.', 'error'); return; }

                const newOwner = {
                    id: 'OWN_' + Date.now().toString(36),
                    name,
                    shareNumerator: num,
                    shareDenominator: den,
                    acquisitionDate: f1Date || '-',
                    notes: f1Notes.trim(),
                };

                setOwners(prev => [...prev, newOwner]);
                setF1Name(''); setF1Num(''); setF1Den(''); setF1Date(''); setF1Notes('');
                showToast(`مالک اولیه «${name}» ثبت شد.`, 'success');
            };

            const deleteOwner = (id) => {
                const target = owners.find(o => o.id === id);
                if (!target) return;
                setConfirmDialog({
                    message: `آیا از حذف «${target.name}» اطمینان دارید؟`,
                    action: () => {
                        setOwners(prev => prev.filter(o => o.id !== id));
                        showToast(`رکورد حذف شد.`, 'info');
                    }
                });
            };

            // ثبت انتقال
            const addTransfer = () => {
                const seller = f2Seller;
                let buyer = '';

                if (f2IsNewBuyer) {
                    buyer = f2NewBuyerName.trim();
                    if (!buyer) { showToast('نام خریدار جدید را وارد کنید.', 'error'); return; }
                } else {
                    buyer = f2Buyer;
                    if (!buyer) { showToast('خریدار را انتخاب کنید.', 'error'); return; }
                }

                const num = parseInt(f2Num) || 0;
                const den = parseInt(f2Den) || 0;

                if (!seller) { showToast('فروشنده باید انتخاب شود.', 'error'); return; }
                if (seller === buyer) { showToast('معامله با خود امکان‌پذیر نیست!', 'error'); return; }
                if (num <= 0 || den <= 0) { showToast('مقدار کسر نامعتبر است.', 'error'); return; }

                const transferValue = num / den;
                const sellerAvailable = getCurrentFraction(seller);

                if (transferValue > sellerAvailable + 0.000001) {
                    showToast(`سهم فروشنده کافی نیست! مانده: ${(sellerAvailable * 100).toFixed(2)}%`, 'error');
                    return;
                }

                const newTransfer = {
                    id: 'TRF_' + Date.now().toString(36),
                    sellerName: seller,
                    buyerName: buyer,
                    transferredNumerator: num,
                    transferredDenominator: den,
                    transferDate: f2Date || '-',
                    notes: f2Notes.trim(),
                };

                setTransfers(prev => [...prev, newTransfer]);
                setF2Seller(''); setF2Buyer(''); setF2NewBuyerName(''); setF2Num(''); setF2Den(''); setF2Date(''); setF2Notes('');
                showToast(`انتقال به «${buyer}» ثبت شد.`, 'success');
            };

            const deleteTransfer = (id) => {
                setConfirmDialog({
                    message: 'آیا مایل به حذف این معامله هستید؟',
                    action: () => {
                        setTransfers(prev => prev.filter(t => t.id !== id));
                        showToast('انتقال حذف شد.', 'info');
                    }
                });
            };

            const showToast = (message, type) => { setToast({ message, type }); };

            // پشتیبان‌گیری
            const exportData = () => {
                const str = JSON.stringify({ area, propertyId, owners, transfers }, null, 2);
                const blob = new Blob([str], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `پشتیبان_سیستم_املاک_${f1Date || 'ثبتی'}.json`;
                a.click();
                showToast('فایل دیتابیس دانلود شد.', 'success');
            };

            const importData = (e) => {
                const file = e.target.files?.[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (evt) => {
                    try {
                        const parsed = JSON.parse(evt.target?.result);
                        if (parsed.owners || parsed.transfers) {
                            if (parsed.area !== undefined) setArea(parsed.area);
                            if (parsed.propertyId !== undefined) setPropertyId(parsed.propertyId);
                            if (parsed.owners) setOwners(parsed.owners);
                            if (parsed.transfers) setTransfers(parsed.transfers);
                            showToast('دیتابیس با موفقیت بازخوانی شد.', 'success');
                        } else { showToast('فرمت فایل نامعتبر است.', 'error'); }
                    } catch { showToast('خطا در پردازش فایل', 'error'); }
                };
                reader.readAsText(file);
                e.target.value = '';
            };

            const resetAll = () => {
                setConfirmDialog({
                    message: 'آیا از حذف کل اطلاعات و ریست کردن پرونده اطمینان دارید؟',
                    action: () => {
                        setOwners([]); setTransfers([]); setArea(0); setPropertyId('');
                        localStorage.removeItem('registry_property_data');
                        showToast('سیستم کاملاً تخلیه شد.', 'info');
                    }
                });
            };

            return (
                <div className="flex flex-col min-h-screen">
                    {toast && <Toast message={toast.message} type={toast.type} onClose={() => setToast(null)} />}
                    {confirmDialog && <ConfirmDialog message={confirmDialog.message} onConfirm={() => { confirmDialog.action(); setConfirmDialog(null); }} onCancel={() => setConfirmDialog(null)} />}

                    {/* ─── هدر موبایل‌پسند ─── */}
                    <header className="bg-slate-900 text-white shadow-md border-b border-slate-800 no-print">
                        <div className="max-w-7xl mx-auto px-4 py-4 flex flex-col md:flex-row items-center justify-between gap-4">
                            <div className="flex items-center gap-3 self-start md:self-auto">
                                <div className="w-10 h-10 bg-slate-800 border border-slate-700 rounded-xl flex items-center justify-center text-xl">🏛️</div>
                                <div>
                                    <h1 className="text-base sm:text-lg font-black tracking-tight text-slate-100">تسهیم سهام مشاعی</h1>
                                    <p className="text-slate-400 text-[10px] sm:text-xs mt-0.5">پلتفرم مدیریت انتقالات ملک</p>
                                </div>
                            </div>
                            
                            <div className="flex flex-wrap items-center justify-start w-full md:w-auto gap-2">
                                <button onClick={exportData} className="flex-1 md:flex-none px-3 py-2 bg-slate-800 hover:bg-slate-700 text-slate-200 text-[10px] sm:text-xs font-semibold rounded-lg border border-slate-700 transition-all text-center">📥 بکاپ</button>
                                <label className="flex-1 md:flex-none px-3 py-2 bg-slate-800 hover:bg-slate-700 text-slate-200 text-[10px] sm:text-xs font-semibold rounded-lg border border-slate-700 transition-all text-center cursor-pointer">
                                    📤 بازخوانی
                                    <input type="file" accept=".json" onChange={importData} className="hidden" />
                                </label>
                                <button onClick={resetAll} className="px-3 py-2 bg-rose-950/40 hover:bg-rose-900/60 text-rose-300 text-[10px] sm:text-xs font-semibold rounded-lg border border-rose-900/50 transition-all">🗑️ ریست</button>
                            </div>
                        </div>

                        {/* تب‌بار با قابلیت اسکرول افقی روی موبایل */}
                        <div className="max-w-7xl mx-auto px-2 sm:px-6">
                            <div className="flex gap-1 border-t border-slate-800/60 pt-2 overflow-x-auto custom-scroll pb-1">
                                {[
                                    { id: 'form1', title: '۱. ثبت اولیه', icon: '📝' },
                                    { id: 'form2', title: '۲. انتقالات', icon: '🔄' },
                                    { id: 'form3', title: '۳. گزارش نهایی', icon: '📊' },
                                    { id: 'guidelines', title: 'راهنما', icon: '📘' },
                                ].map(tab => (
                                    <button 
                                        key={tab.id} 
                                        onClick={() => setActiveTab(tab.id)}
                                        className={`px-4 py-2.5 text-[11px] sm:text-xs font-bold rounded-t-xl transition-all border-t-2 whitespace-nowrap flex items-center gap-1.5 ${
                                            activeTab === tab.id 
                                                ? 'bg-slate-50 text-slate-900 border-blue-600 shadow-sm' 
                                                : 'text-slate-400 hover:text-slate-100 hover:bg-slate-800/50 border-transparent'
                                        }`}
                                    >
                                        <span>{tab.icon}</span>
                                        <span>{tab.title}</span>
                                    </button>
                                ))}
                            </div>
                        </div>
                    </header>

                    {/* ─── بدنه اصلی برنامه‌ ─── */}
                    <main className="flex-1 max-w-7xl w-full mx-auto px-3 sm:px-6 py-4 sm:py-6">

                        {/* فرم ۱: مالکین اولیه */}
                        {activeTab === 'form1' && (
                            <div className="grid grid-cols-1 lg:grid-cols-5 gap-4 sm:gap-6 no-print">
                                <div className="lg:col-span-2 bg-white border border-slate-200 shadow-sm rounded-xl p-4 sm:p-5">
                                    <h2 className="text-sm font-bold text-slate-900 mb-4 pb-2 border-b border-slate-100 flex items-center gap-2">
                                        <span className="w-5 h-5 bg-blue-100 text-blue-700 text-xs font-black rounded-md flex items-center justify-center">۱</span>
                                        مشخصات ثبتی و ملک مادر
                                    </h2>
                                    <div className="space-y-4">
                                        <div className="grid grid-cols-2 gap-3">
                                            <div>
                                                <label className="block text-[10px] sm:text-[11px] font-bold text-slate-600 mb-1">کلاسه/پلاک ثبتی</label>
                                                <input type="text" value={propertyId} onChange={e => setPropertyId(e.target.value)} placeholder="مثلا ۱۲۴/۴" className="w-full text-xs px-3 py-2 border border-slate-200 rounded-lg bg-slate-50 focus:bg-white focus:outline-blue-600" />
                                            </div>
                                            <div>
                                                <label className="block text-[10px] sm:text-[11px] font-bold text-slate-600 mb-1">مساحت عرصه (متر)</label>
                                                <input type="number" inputMode="decimal" value={area || ''} onChange={e => setArea(parseFloat(e.target.value) || 0)} placeholder="مثلاً ۴۲۰.۵" className="w-full text-xs px-3 py-2 border border-slate-200 rounded-lg bg-slate-50 focus:bg-white focus:outline-blue-600 font-bold" />
                                            </div>
                                        </div>

                                        <h2 className="text-xs sm:text-sm font-bold text-slate-900 pt-2 mb-2 flex items-center gap-2">🔹 ورود اطلاعات مالکین اولیه</h2>
                                        
                                        <div>
                                            <label className="block text-[10px] sm:text-[11px] font-bold text-slate-600 mb-1">نام مالک اولیه</label>
                                            <input type="text" value={f1Name} onChange={e => setF1Name(e.target.value)} placeholder="نام شخص مبدا" className="w-full text-xs px-3 py-2 border border-slate-200 rounded-lg focus:outline-blue-600" />
                                        </div>

                                        <div className="grid grid-cols-2 gap-3">
                                            <div>
                                                <label className="block text-[10px] sm:text-[11px] font-bold text-slate-600 mb-1">سهم (صورت کسر)</label>
                                                <input type="number" inputMode="numeric" value={f1Num} onChange={e => setF1Num(e.target.value)} placeholder="مثال: ۳" className="w-full text-xs px-3 py-2 border border-slate-200 rounded-lg text-center" />
                                            </div>
                                            <div>
                                                <label className="block text-[10px] sm:text-[11px] font-bold text-slate-600 mb-1">از کل (مخرج کسر)</label>
                                                <input type="number" inputMode="numeric" value={f1Den} onChange={e => setF1Den(e.target.value)} placeholder="مثال: ۶" className="w-full text-xs px-3 py-2 border border-slate-200 rounded-lg text-center" />
                                            </div>
                                        </div>

                                        <div className="flex gap-1 justify-center py-1">
                                            <button type="button" onClick={() => setF1Den('6')} className="flex-1 text-[10px] font-bold bg-slate-100 hover:bg-slate-200 px-1 py-1.5 rounded text-slate-600 transition-all">مبنای ۶ دانگ</button>
                                            <button type="button" onClick={() => setF1Den('100')} className="flex-1 text-[10px] font-bold bg-slate-100 hover:bg-slate-200 px-1 py-1.5 rounded text-slate-600 transition-all">مبنای ۱۰۰</button>
                                            <button type="button" onClick={() => setF1Den('10000')} className="flex-1 text-[10px] font-bold bg-slate-100 hover:bg-slate-200 px-1 py-1.5 rounded text-slate-600 transition-all">۱۰,۰۰۰ سهمی</button>
                                        </div>

                                        <div className="grid grid-cols-1 gap-3">
                                            <div>
                                                <label className="block text-[10px] sm:text-[11px] font-bold text-slate-600 mb-1">تاریخ تملک / سند</label>
                                                <input type="text" value={f1Date} onChange={e => setF1Date(e.target.value)} placeholder="مثال: ۱۴۰۱/۰۴/۱۲" className="w-full text-xs px-3 py-2 border border-slate-200 rounded-lg text-center" />
                                            </div>
                                        </div>

                                        <button onClick={addOwner} className="w-full bg-slate-900 hover:bg-slate-800 text-white text-xs font-bold py-3 rounded-lg transition-all shadow-sm">
                                            + ثبت در دفتر املاک
                                        </button>
                                    </div>
                                </div>

                                <div className="lg:col-span-3 bg-white border border-slate-200 shadow-sm rounded-xl overflow-hidden flex flex-col">
                                    <div className="bg-slate-50 px-4 py-3 border-b border-slate-200 flex justify-between items-center">
                                        <span className="font-bold text-slate-800 text-xs">دفتر مالکین اولیه</span>
                                        <span className="bg-slate-200 text-slate-700 text-[10px] font-black px-2 py-0.5 rounded-full">{owners.length} ردیف</span>
                                    </div>
                                    {owners.length === 0 ? (
                                        <div className="flex-1 flex items-center justify-center p-8 text-slate-400 text-xs text-center">
                                            <span>ثبتی انجام نشده است. ابتدا مشخصات را وارد نمایید.</span>
                                        </div>
                                    ) : (
                                        <div className="overflow-x-auto text-xs custom-scroll max-h-[50vh]">
                                            <table className="w-full text-right border-collapse whitespace-nowrap">
                                                <thead className="bg-slate-100/70 text-slate-600 border-b border-slate-200 sticky top-0">
                                                    <tr>
                                                        <th className="p-3 font-bold">نام مالک مبدا</th>
                                                        <th className="p-3 font-bold">سهم اولیه</th>
                                                        <th className="p-3 font-bold text-center">حذف</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-100">
                                                    {owners.map(o => (
                                                        <tr key={o.id} className="hover:bg-slate-50/60">
                                                            <td className="p-3 font-bold text-slate-900">{o.name}</td>
                                                            <td className="p-3"><span className="bg-slate-100 text-slate-700 font-medium px-2 py-0.5 rounded">{formatFraction(o.shareNumerator, o.shareDenominator)}</span></td>
                                                            <td className="p-3 text-center">
                                                                <button onClick={() => deleteOwner(o.id)} className="text-rose-600 hover:bg-rose-50 px-2 py-1 rounded-md font-bold">❌</button>
                                                            </td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* فرم ۲: انتقالات */}
                        {activeTab === 'form2' && (
                            <div className="grid grid-cols-1 lg:grid-cols-5 gap-4 sm:gap-6 no-print">
                                <div className="lg:col-span-2 bg-white border border-slate-200 shadow-sm rounded-xl p-4 sm:p-5">
                                    <h2 className="text-sm font-bold text-slate-900 mb-4 pb-2 border-b border-slate-100 flex items-center gap-2">
                                        <span className="w-5 h-5 bg-blue-100 text-blue-700 text-xs font-black rounded-md flex items-center justify-center">۲</span>
                                        ثبت معامله / انتقال سهم
                                    </h2>
                                    
                                    <div className="space-y-4">
                                        <div>
                                            <label className="block text-[10px] sm:text-[11px] font-bold text-slate-600 mb-1">مالک ناقل (فروشنده)</label>
                                            <select value={f2Seller} onChange={e => setF2Seller(e.target.value)} className="w-full text-xs px-3 py-2 border border-slate-200 rounded-lg bg-white focus:outline-blue-600 font-medium">
                                                <option value="">-- انتخاب فروشنده --</option>
                                                {allNames.map(name => {
                                                    const bal = getCurrentFraction(name);
                                                    if (bal <= 0.000001) return null;
                                                    return (
                                                        <option key={name} value={name}>
                                                            {name} (سهم جاری: {(bal * 100).toFixed(2)}%)
                                                        </option>
                                                    );
                                                })}
                                            </select>
                                        </div>

                                        <div className="bg-slate-50 p-3 rounded-lg border border-slate-200/60 space-y-3">
                                            <div className="flex items-center justify-between">
                                                <span className="text-[10px] sm:text-[11px] font-bold text-slate-700">مشخصات خریدار</span>
                                                <label className="inline-flex items-center gap-1.5 cursor-pointer">
                                                    <input type="checkbox" checked={f2IsNewBuyer} onChange={e => setF2IsNewBuyer(e.target.checked)} className="rounded text-blue-600 w-3 h-3" />
                                                    <span className="text-[10px] font-bold text-blue-700">شخص جدید؟</span>
                                                </label>
                                            </div>

                                            {f2IsNewBuyer ? (
                                                <input type="text" value={f2NewBuyerName} onChange={e => setF2NewBuyerName(e.target.value)} placeholder="نام خریدار جدید..." className="w-full text-xs px-3 py-2 bg-white border border-slate-200 rounded-lg focus:outline-blue-600" />
                                            ) : (
                                                <select value={f2Buyer} onChange={e => setF2Buyer(e.target.value)} className="w-full text-xs px-3 py-2 bg-white border border-slate-200 rounded-lg focus:outline-blue-600 font-medium">
                                                    <option value="">-- انتخاب از مالکین موجود --</option>
                                                    {allNames.map(name => <option key={name} value={name}>{name}</option>)}
                                                </select>
                                            )}
                                        </div>

                                        <div className="grid grid-cols-2 gap-3">
                                            <div>
                                                <label className="block text-[10px] sm:text-[11px] font-bold text-slate-600 mb-1">سهم مورد انتقال</label>
                                                <input type="number" inputMode="numeric" value={f2Num} onChange={e => setF2Num(e.target.value)} placeholder="مثلاً ۱" className="w-full text-xs px-3 py-2 border border-slate-200 rounded-lg text-center font-bold" />
                                            </div>
                                            <div>
                                                <label className="block text-[10px] sm:text-[11px] font-bold text-slate-600 mb-1">از کل (مخرج)</label>
                                                <input type="number" inputMode="numeric" value={f2Den} onChange={e => setF2Den(e.target.value)} placeholder="مثلاً ۶" className="w-full text-xs px-3 py-2 border border-slate-200 rounded-lg text-center font-bold" />
                                            </div>
                                        </div>

                                        <div className="flex gap-1 justify-center py-1">
                                            <button type="button" onClick={() => setF2Den('6')} className="flex-1 text-[10px] font-bold bg-slate-100 hover:bg-slate-200 px-1 py-1.5 rounded text-slate-600">مبنای ۶ دانگ</button>
                                            <button type="button" onClick={() => setF2Den('100')} className="flex-1 text-[10px] font-bold bg-slate-100 hover:bg-slate-200 px-1 py-1.5 rounded text-slate-600">مبنای ۱۰۰</button>
                                            <button type="button" onClick={() => setF2Den('10000')} className="flex-1 text-[10px] font-bold bg-slate-100 hover:bg-slate-200 px-1 py-1.5 rounded text-slate-600">۱۰,۰۰۰ سهمی</button>
                                        </div>

                                        <div>
                                            <label className="block text-[10px] sm:text-[11px] font-bold text-slate-600 mb-1">تاریخ معامله</label>
                                            <input type="text" value={f2Date} onChange={e => setF2Date(e.target.value)} placeholder="مثال: ۱۴۰۳/۱۱/۲۰" className="w-full text-xs px-3 py-2 border border-slate-200 rounded-lg text-center" />
                                        </div>

                                        <button onClick={addTransfer} className="w-full bg-blue-700 hover:bg-blue-800 text-white text-xs font-bold py-3 rounded-lg transition-all shadow-sm">
                                            🔄 ثبت معامله
                                        </button>
                                    </div>
                                </div>

                                <div className="lg:col-span-3 bg-white border border-slate-200 shadow-sm rounded-xl overflow-hidden flex flex-col">
                                    <div className="bg-slate-50 px-4 py-3 border-b border-slate-200 flex justify-between items-center">
                                        <span className="font-bold text-slate-800 text-xs">دفتر گردش انتقالات</span>
                                        <span className="bg-blue-100 text-blue-800 text-[10px] font-black px-2 py-0.5 rounded-full">{transfers.length} معامله</span>
                                    </div>
                                    {transfers.length === 0 ? (
                                        <div className="flex-1 flex items-center justify-center p-8 text-slate-400 text-xs text-center">
                                            <span>تاکنون هیچ سند جابه‌جایی ثبت نشده است.</span>
                                        </div>
                                    ) : (
                                        <div className="overflow-x-auto text-xs custom-scroll max-h-[50vh]">
                                            <table className="w-full text-right border-collapse whitespace-nowrap">
                                                <thead className="bg-slate-100/70 text-slate-600 border-b border-slate-200 sticky top-0">
                                                    <tr>
                                                        <th className="p-3 font-bold">فروشنده</th>
                                                        <th className="p-3 font-bold">کسر معامله</th>
                                                        <th className="p-3 font-bold">خریدار</th>
                                                        <th className="p-3 font-bold text-center">حذف</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-100">
                                                    {transfers.map(t => (
                                                        <tr key={t.id} className="hover:bg-slate-50/60">
                                                            <td className="p-3 font-bold text-red-700">{t.sellerName}</td>
                                                            <td className="p-3"><span className="bg-amber-50 text-amber-800 font-bold px-2 py-0.5 rounded">{formatFraction(t.transferredNumerator, t.transferredDenominator)}</span></td>
                                                            <td className="p-3 font-bold text-emerald-700">{t.buyerName}</td>
                                                            <td className="p-3 text-center"><button onClick={() => deleteTransfer(t.id)} className="text-slate-400 hover:text-red-500">🗑️</button></td>
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* فرم ۳: گزارش نهایی */}
                        {activeTab === 'form3' && (
                            <div className="space-y-4">
                                <div className="flex flex-col sm:flex-row justify-between items-center gap-3 bg-white p-4 rounded-xl shadow-sm border border-slate-200 no-print">
                                    <span className="text-slate-500 text-[10px] sm:text-xs font-medium text-center sm:text-right">آماده پرینت رسمی. برای ذخیره PDF روی دکمه چاپ کلیک کنید.</span>
                                    <button onClick={() => window.print()} className="w-full sm:w-auto bg-slate-950 hover:bg-slate-900 text-white px-4 py-2.5 rounded-lg text-xs font-bold flex justify-center items-center gap-2">
                                        🖨️ چاپ صورت‌جلسه
                                    </button>
                                </div>

                                <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5 sm:p-8 print:border-none print:shadow-none print:p-0 print-card">
                                    <div className="text-center pb-4 sm:pb-6 border-b border-slate-300 mb-4 sm:mb-6">
                                        <h2 className="text-base sm:text-xl font-black text-slate-900">گزارش خلاصه وضعیت و تسهیم سهم پایانی مالکین مشاعی</h2>
                                        <div className="flex flex-col sm:flex-row justify-center gap-2 sm:gap-6 pt-3 text-[10px] sm:text-xs text-slate-600 font-bold">
                                            {propertyId && <div>🏢 پلاک/کلاسه پرونده: <span className="text-slate-950">{propertyId}</span></div>}
                                            {area > 0 && <div>📐 مساحت کل عرصه: <span className="text-slate-950">{area.toLocaleString()}</span> متر مربع</div>}
                                            <div>👥 مالکین نهایی: <span className="text-slate-950">{finalOwners.length} نفر</span></div>
                                        </div>
                                    </div>

                                    {finalOwners.length === 0 ? (
                                        <div className="p-8 text-center text-slate-400 text-xs">اطلاعاتی موجود نیست.</div>
                                    ) : (
                                        <div className="overflow-x-auto text-[10px] sm:text-xs">
                                            <table className="w-full text-right border-collapse whitespace-nowrap">
                                                <thead>
                                                    <tr className="bg-slate-100 text-slate-900 border-b border-slate-300 print:bg-slate-100">
                                                        <th className="p-2 sm:p-3 font-bold text-center">ردیف</th>
                                                        <th className="p-2 sm:p-3 font-bold">نام ذینفع نهایی</th>
                                                        <th className="p-2 sm:p-3 font-bold">سهم باقی‌مانده</th>
                                                        <th className="p-2 sm:p-3 font-bold">درصد (%)</th>
                                                        {area > 0 && <th className="p-2 sm:p-3 font-bold">مساحت معادل</th>}
                                                    </tr>
                                                </thead>
                                                <tbody className="divide-y divide-slate-200 text-slate-800">
                                                    {finalOwners.map((fo, idx) => (
                                                        <tr key={fo.name} className="hover:bg-slate-50/50">
                                                            <td className="p-2 sm:p-3 text-center text-slate-400">{idx + 1}</td>
                                                            <td className="p-2 sm:p-3 font-bold text-slate-900">{fo.name}</td>
                                                            <td className="p-2 sm:p-3"><span className="bg-slate-100 px-2 py-0.5 rounded font-bold border border-slate-200/50 print:bg-transparent print:border-none">{formatFraction(fo.shareNumerator, fo.shareDenominator)}</span></td>
                                                            <td className="p-2 sm:p-3 font-bold text-blue-800 print:text-black">{fo.percentage.toFixed(3)} %</td>
                                                            {area > 0 && <td className="p-2 sm:p-3 font-black text-emerald-800 print:text-black">{fo.exactArea.toLocaleString()} متر</td>}
                                                        </tr>
                                                    ))}
                                                </tbody>
                                            </table>

                                            {/* کادر امضا فقط در زمان چاپ */}
                                            <div className="hidden print:block mt-12 pt-6 border-t border-dashed border-slate-300">
                                                <div className="text-[9px] text-slate-400 text-left mb-6">سامانه تسهیم املاک - تاریخ: {new Date().toLocaleDateString('fa-IR')}</div>
                                                <div className="grid grid-cols-3 gap-4 text-center font-bold text-[10px] text-slate-800">
                                                    <div className="border border-slate-200 p-4 rounded-lg">امضاء متعاملین</div>
                                                    <div className="border border-slate-200 p-4 rounded-lg">تصدیق هویت و تایید کارشناس</div>
                                                    <div className="border border-slate-200 p-4 rounded-lg">بایگانی ثبتی</div>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* برگه راهنما */}
                        {activeTab === 'guidelines' && (
                            <div className="max-w-2xl mx-auto bg-white border border-slate-200 shadow-sm rounded-xl p-5 sm:p-6 text-[11px] sm:text-xs leading-relaxed text-slate-600 space-y-4 no-print">
                                <h2 className="text-sm font-bold text-slate-900">📘 راهنمای سامانه تسهیم</h2>
                                <p>این سیستم اختصاصاً جهت محاسبه موازنه کسر سهام طراحی شده است:</p>
                                <div className="space-y-2">
                                    <div className="p-3 bg-slate-50 border border-slate-200 rounded-lg">
                                        <h3 className="font-bold text-slate-800 mb-1">گام اول: پلاک مادر</h3>
                                        <p>شماره پلاک و متراژ را وارد کرده و افرادی که در سند اولیه دارای سهم بوده‌اند را ثبت کنید.</p>
                                    </div>
                                    <div className="p-3 bg-slate-50 border border-slate-200 rounded-lg">
                                        <h3 className="font-bold text-slate-800 mb-1">گام دوم: چرخش اسناد</h3>
                                        <p>فروشنده را انتخاب کنید. اگر خریدار فرد جدیدی است، چک‌باکس را فعال کرده و نامش را بنویسید. میزان انتقال را ثبت کنید.</p>
                                    </div>
                                    <div className="p-3 bg-slate-50 border border-slate-200 rounded-lg">
                                        <h3 className="font-bold text-slate-800 mb-1">گام سوم: فیلتراسیون نهایی</h3>
                                        <p>سیستم خودکار سهم‌های فروخته شده را کسر و مالکین با سهم صفر را حذف می‌کند. جدول نهایی آماده چاپ است.</p>
                                    </div>
                                    <div className="p-3 bg-slate-900 text-slate-300 rounded-lg">
                                        <h3 className="font-bold text-white mb-1">🔒 حفاظت از داده‌ها:</h3>
                                        <p>هیچ اطلاعاتی به اینترنت ارسال نمی‌شود (کاملاً آفلاین). حتماً از دکمه «📥 بکاپ» در بالای هدر برای آرشیو پرونده‌ها استفاده کنید.</p>
                                    </div>
                                </div>
                            </div>
                        )}

                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
